roi_hor_spacing: 
  description: "Horizontal spacing between figure with individual ROI"
  value: 10
  
roi_ver_spacing: 
  description: "Vertical spacing between figure with individual ROI"
  value: 50

roi_plot_height: 
  description: "Figure height of figure with individual ROI"
  value: 100
  
roi_plot_width: 
  description: "Figure width of figure with individual ROI"
  value: 100

ecc_size_num_bins: 
  description: "Number of bins for eccentricity vs size plot"
