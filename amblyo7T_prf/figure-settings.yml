# Flatmaps
flatmap_corr_scale: 
  description: "Inter-run correlation r-square flatmap colorscale"
  value: [-1, 1]

flatmap_rsq_scale:
  description: "pRF r-square flatmap colorscale"
  value: [0, 1]

flatmap_ecc_scale: 
  description: "pRF eccentricity flatmap colorscale"
  value: [0, 10]
  
flatmap_size_scale:
  description: "pRF size flatmap colorscale"
  value: [0, 10]

flatmap_alpha_range:
  description: "Flatmap colorscale transparency range (min=transparent, max:fully opaque)"
  value: [0, 0.4]

flatmap_n_scale: 
  description: "pRF n flatmap colorscale"
  value: [0, 1]

flatmap_pcm_scale: 
  description: "pRF cortical magnification flatmap colorscale"
  value: [0, 10]

rois_colors:
  description: "Color in RGB used in different plots for each ROI"
  value:
    n/a: [255, 255, 255]
    V1: [243, 231, 155]
    V2: [250, 196, 132]
    V3: [248, 160, 126]
    V3AB: [235, 127, 134]
    LO: [150, 0, 90] 
    VO: [0, 0, 200]
    hMT+: [0, 25, 255]

# Main figures
roi_colors:
  description: "Colors to use for each ROI"
  value:
    V1: "rgb(243, 231, 155)"
    V2: "rgb(250, 196, 132)"
    V3: "rgb(248, 160, 126)"
    V3AB: "rgb(235, 127, 134)"
    LO: "rgb(150, 0, 90)"
    VO: "rgb(0, 0, 200)"
    hMT+: "rgb(0, 25, 255)"

rois_groups_plot:
  description: "Grouping of ROIs in figures with grouped values"
  value:
    - ["V1", "V2"]
    - ["V3", "V3AB"]
    - ["LO", "VO", "hMT+"]

rois_fig_margin: 
  description: "Margin for figure with multiple ROIs"
