# Correlation figures
prf_tasks_eyes_names:
  description: "Comparison groups of the concatenation of runs across the eye condition used to compute the correlation"
  value: [['BarsBarsRingsWedgesRightEye', 'BarsBarsRingsWedgesLeftEye'],['BarsBarsRightEye', 'BarsBarsLeftEye'],['RingsWedgesRightEye', 'RingsWedgesLeftEye']]

corr_params:
  description: "Parameters to correlate between amblyopic/right and fellow/left eye runs"
  value: ['prf_rsq', 'prf_x', 'prf_y', 'prf_size', 'prf_ecc', 'pcm_median']

corr_grid_size:
  description: "Number of bins along each axis of the 2D KDE evaluation grid"
  value: 100

prf_rsq_param_range:
  description: "Axis range for pRF R² in the 2D correlation KDE plot"
  value: [0, 0.8]

prf_x_param_range:
  description: "Axis range for pRF x coord in the 2D correlation KDE plot"
  value: [-5, 5]

prf_y_param_range:
  description: "Axis range for pRF y coord in the 2D correlation KDE plot"
  value: [-5, 5]

prf_size_param_range:
  description: "Axis range for pRF size in the 2D correlation KDE plot"
  value: [0, 2]

prf_ecc_param_range:
  description: "Axis range for pRF eccentricity in the 2D correlation KDE plot"
  value: [0, 10]

pcm_median_param_range:
  description: "Axis range for pRF CM in the 2D correlation KDE plot"
  value: [0, 30]

corr_ecc_th:
  description: "Eccentricity range threshold for eye correlation analysis"
  units: "dva"
  value: [0.05, 10]

corr_size_th:
  description: "Size range threshold for eye correlation analysis"
  units: "dva"
  value: [0.05, 6]

corr_rsqr_th:
  description: "R-square minimum threshold for eye correlation analysis"
  value: 0

corr_n_th:
  description: "CSS n range threshold for eye correlation analysis"
  value: [0.01, 1]

corr_prf_amp_th: 
  description: "pRF amplitude range threshold for eye correlation analysis"
  value: [-6, 6]

corr_stats_th: 
  description: "p value minimum threshold for eye correlation analysis"
  value: 0.01

ecc_bin_power:
  description: "Power function exponent for eccentricity binning (1=linear, >1=finer near fovea)"
  value: 1.25

ecc_rsq_range:
  description: "R2 axis range in the ecc-size-pcm eye condition plot"
  value: [0, 1]

ecc_n_vert_range:
  description: "Vertex count axis range in the ecc-size-pcm eye condition plot"
  value: [0, 2000]

ecc_range:
  description: "PRF eccentricity axis range in the ecc-size-pcm eye condition plot"
  value: [0, 6]

size_range:
  description: "PRF size axis range in the ecc-size-pcm eye condition plot"
  value: [0, 6]

pmc_range:
  description: "PRF CM axis range in the ecc-size-pcm eye condition plot"
  value: [0, 25]

ecc_comp_params:
  description: "Parameters to compare across pRF eccentricity (foveal vs periphery"
  value: ['prf_rsq', 'prf_size', 'prf_ecc', 'pcm_median', 'n_vert']

foveal_ecc_bound:
  description: "Eccentricity boundary (dva) separating foveal (<= bound) from peripheral (> bound) pRFs"
  value: 2.5

# Comp ECC figure
# --- Add these entries to figure-settings.yml (ecc_comp figure settings) ---

ecc_comp_fig_width:
  description: "Width of each ecc-comp figure in pixels"
  value: 1600

ecc_comp_fig_height:
  description: "Height of each ecc-comp figure in pixels"
  value: 1400

ecc_comp_marker_size:
  description: "Marker size in ecc-comp figures"
  value: 8

ecc_comp_roi_x_spacing:
  description: "Spacing between ROIs on the fake continuous x axis"
  value: 1.0

ecc_comp_marker_offset:
  description: "Offset between eye condition markers within an ROI. First value for 2 conditions (e.g. AE/FE or RE/LE), second value for 3 conditions (e.g. AE/FE/CTRL)"
  value: [0.11, 0.22]

# pRF R² ranges
ecc_comp_rsq_all_range:
  description: "pRF R² axis range for all pRF in ecc-comp figure"
  value: [0, 1]

ecc_comp_rsq_foveal_range:
  description: "pRF R² axis range for foveal pRF in ecc-comp figure"
  value: [0, 1]

ecc_comp_rsq_peripheral_range:
  description: "pRF R² axis range for peripheral pRF in ecc-comp figure"
  value: [0, 1]

# pRF size ranges
ecc_comp_size_all_range:
  description: "pRF size axis range for all pRF in ecc-comp figure"
  value: [0, 3]

ecc_comp_size_foveal_range:
  description: "pRF size axis range for foveal pRF in ecc-comp figure"
  value: [0, 2]

ecc_comp_size_peripheral_range:
  description: "pRF size axis range for peripheral pRF in ecc-comp figure"
  value: [0, 4]

# pRF eccentricity ranges
ecc_comp_ecc_all_range:
  description: "pRF eccentricity axis range for all pRF in ecc-comp figure"
  value: [0, 5]

ecc_comp_ecc_foveal_range:
  description: "pRF eccentricity axis range for foveal pRF in ecc-comp figure"
  value: [0, 3]

ecc_comp_ecc_peripheral_range:
  description: "pRF eccentricity axis range for peripheral pRF in ecc-comp figure"
  value: [0, 8]

# pRF CM ranges
ecc_comp_pcm_all_range:
  description: "pRF CM axis range for all pRF in ecc-comp figure"
  value: [0, 30]

ecc_comp_pcm_foveal_range:
  description: "pRF CM axis range for foveal pRF in ecc-comp figure"
  value: [0, 30]

ecc_comp_pcm_peripheral_range:
  description: "pRF CM axis range for peripheral pRF in ecc-comp figure"
  value: [0, 10]

# ecc_comp_params: parameters with CI (excludes n_vert)
ecc_comp_params:
  description: "Parameters computed in the ecc comparison analysis (excludes n_vert which has no CI)"
  value: ['prf_rsq', 'prf_size', 'prf_ecc', 'pcm_median']