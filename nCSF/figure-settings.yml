# Rois Figures settings
# ---------------------
rois_colors:
  description: "Color in RGB used in different plots for each ROI"
  value:
    n/a: [255, 255, 255]
    V1: [243, 231, 155]
    V2: [250, 196, 132]
    V3: [248, 160, 126]
    V3AB: [235, 127, 134]
    LO: [150, 0, 90] 
    VO: [0, 0, 200]
    hMT+: [0, 25, 255]
    iIPS: [0, 152, 255]
    sIPS: [44, 255, 150]
    iPCS: [151, 255, 0]
    sPCS: [255, 234, 0]
    mPCS: [255, 111, 0]

roi_colors:
  description: "Colors to use for each ROI"
  value:
    V1: "rgb(243, 231, 155)"
    V2: "rgb(250, 196, 132)"
    V3: "rgb(248, 160, 126)"
    V3AB: "rgb(235, 127, 134)"
    LO: "rgb(150, 0, 90)"
    VO: "rgb(0, 0, 200)"
    hMT+: "rgb(0, 25, 255)"
    iIPS: "rgb(0, 152, 255)"
    sIPS: "rgb(44, 255, 150)"
    iPCS: "rgb(151, 255, 0)"
    sPCS: "rgb(255, 234, 0)"
    mPCS: "rgb(255, 111, 0)"

rois_groups_plot:
  description: "Grouping of ROIs in figures with grouped values"
  value:
    - ["V1", "V2", "V3"]
    - ["V3AB", "LO", "VO"]
    - ["hMT+", "iIPS", "sIPS"]
    - ["iPCS", "sPCS", "mPCS"]

# Rois figures sizes
rois_fig_margin: 
  description: "Margin for figure with multiple ROIs"
  value: [100, 50, 50, 75]
  
rois_hor_spacing: 
  description: "Horizontal spacing between figure with multiple ROIs"
  value: 100
  
rois_ver_spacing: 
  description: "Vertical spacing between figure with multiple ROIs"
  value: 50

rois_bar_width: 
  description: "Bar width of plots with multiple ROIs"
  value: 50
  
rois_plot_height: 
  description: "Figure height of figure with multiple ROIs"
  value: 200
  
rois_plot_width:
  description: "Figure width of figure with multiple ROIs"
  value: 200

roi_fig_margin: 
  description: "Margin for figure with individual ROI"
