# Correlations Flatmaps
# ---------------------
flatmap_corr_scale: 
  description: "Inter-run correlation r-square flatmap colorscale"
  value: [-1, 1]

# pRF Flatmaps
# ------------
flatmap_rsq_scale:
  description: "pRF r-square flatmap colorscale"
  value: [0, 1]

flatmap_ecc_scale: 
  description: "pRF eccentricity flatmap colorscale"
  value: [0, 10]
  
flatmap_size_scale:
  description: "pRF size flatmap colorscale"
  value: [0, 10]

flatmap_alpha_range:
  description: "Flatmap colorscale transparency range (min=transparent, max:fully opaque)"
  value: [0, 0.4]

flatmap_n_scale: 
  description: "pRF n flatmap colorscale"
  value: [0, 1]

flatmap_pcm_scale: 
  description: "pRF cortical magnification flatmap colorscale"
  value: [0, 10]

