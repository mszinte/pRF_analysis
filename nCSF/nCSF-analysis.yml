nCSF_session: 
  description: "session of nCSF task"
  value: "ses-01"
 
ncsf_n_runs:
  description: "number of run for nCSF task"
  value: 10

sf_minFreq:
  description: "lowest spatial frequency"
  value: 0.05

sf_maxFreq:
  description: "highest spatial frequency"
  value: 16

sf_filtNum:
  description: "number of spatial frequency"
  value: 6

sf_filtOverlap:
  description: "proportion of overlap between gaussian filter"
  value: 0.6

minCont:
  description: "lowest contrast in % Michelson contrast"
  value: 0.25

maxCont:
  description: "highest contrast in % Michelson contrast"
  value: 80

contNum:
  description: "number of contrast steps"
  value: 12

ncsf_grid_nr:
  description: "number of steps for nCSH gridfit"
  value: 8

ncsf_iterative_rsq_threshold:
  description: "rsq threshold for nCSF iterative fit"
  value: 0.1

maps_names_ncsf:
  description: "map names for nCSF fit object"
  value: ['width_r', 'SFp', 'CSp', 'width_l', 'crf_exp', 'amp_1', 'bold_baseline', 'hrf_1', 'hrf_2', 'ncsf_rsq', 'auc', 'normalize_auc', 'SFmax']

maps_names_ncsf_stats: 
  description: "nCSF stats maps names of gifti files"
  value: ["slope", "intercept", "rvalue", "pvalue", "stderr", "trs", "corr_pvalue_5pt", "corr_pvalue_1pt"]

run_ncsf_fit_on_rois:
  description: "Run nCSF fit only on roi (True) or on full brain (False)"
  value: True

# ROIS
rois_methods:
  description: "Method use to define ROIS, defined for each format"
  value: 
    fsnative: ["rois-group-mmp"]
    170k: ["rois-group-mmp"]
  levels: ["rois-drawn", "rois-group-mmp"]
  level-description: 
    rois-drawn: "ROIs hand-drawn using Inskape as defined in rois-drawn (see below)"
    rois-group-mmp: "ROIS based on grouped mmp glasser atlas parcelations as defined in rois_mmp_groups (see below)"
